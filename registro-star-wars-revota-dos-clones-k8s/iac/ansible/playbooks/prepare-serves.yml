---
- name: Preparar servidores para futura instalação do Kubernetes
  hosts: k8s_nodes
  become: true
  vars_files:
    - ../group_vars/all.yml
  tasks:
    - name: Atualizar cache do APT
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Instalar pacotes básicos
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

    - name: Criar usuário administrativo
      ansible.builtin.user:
        name: "{{ admin_user }}"
        groups: sudo
        append: true
        shell: /bin/bash
        create_home: true

    - name: Criar diretório .ssh do usuário administrativo
      ansible.builtin.file:
        path: "/home/{{ admin_user }}/.ssh"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0700"

    - name: Configurar authorized_keys do usuário administrativo
      ansible.builtin.copy:
        content: "{{ admin_pubkey }}\n"
        dest: "/home/{{ admin_user }}/.ssh/authorized_keys"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0600"

    - name: Desativar autenticação SSH por senha
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
        state: present
      notify: Reiniciar SSH

    - name: Desativar login SSH de root
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin no"
        state: present
      notify: Reiniciar SSH

  handlers:
    - name: Reiniciar SSH
      ansible.builtin.service:
        name: ssh
        state: restarted